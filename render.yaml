services:
  - type: web
    name: python-qa-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: EMBEDDING_PROVIDER
        value: hash
      - key: EMBEDDING_DIMENSION
        value: "384"
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: liquid/lfm-2.5-1.2b-instruct:free
      - key: OPENROUTER_APP_NAME
        value: Python Q&A Assistant
      - key: PINECONE_INDEX_NAME
        value: python-qa-assistant
      - key: PINECONE_NAMESPACE
        value: production
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: DATA_PATH
        value: ./data/sample_python_qa.json
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: OPENROUTER_SITE_URL
        sync: false

  - type: web
    name: python-qa-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: API_BASE_URL
        sync: false
